name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # LEFT PANEL: Header, Habits, & High-Contrast Git Volume Lines
      - name: Generate Left Side
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # Coding Habits
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Lines of Code (Adds bright green/red code delta tracking)
          plugin_lines: yes

      # RIGHT PANEL: 3D Calendar, Languages, Emojis, and Badges
      - name: Generate Right Side
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          
          # 3D Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Multi-Language Polyglot Analysis
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Tech Icon Stack
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          
          # Community Reactions (Adds vibrant emoji counter statistics)
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_days: 30
          
          # Gamified Achievements (Adds ultra-colorful badges in a micro-strip format)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
