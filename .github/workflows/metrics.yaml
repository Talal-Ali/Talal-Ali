name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # LEFT VISUAL PANEL: Header, Habits, Code Volume, Skyline, LeetCode, & AniList
      - name: Generate Left Side Visuals
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header
          config_timezone: Asia/Karachi
          
          # 3D Skyline City
          plugin_skyline: yes
          plugin_skyline_year: current
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.5
          
          # Coding Habits Donut Charts
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: no
          plugin_habits_charts: yes
          
          # Lines of Code
          plugin_lines: yes

          # LeetCode Stats (Displays your coding challenges progress)
          plugin_leetcode: yes
          plugin_leetcode_user: Talal-Ali
          plugin_leetcode_sections: overview, solved, skills

          # AniList Watchlist (Displays your current watching/reading status)
          plugin_anilist: yes
          plugin_anilist_user: Talal-Ali
          plugin_anilist_medias: anime
          plugin_anilist_sections: watching
          plugin_anilist_limit: 2

      # RIGHT VISUAL PANEL: 3D Calendar, Activity Waves, Languages, Badges, Stars, & PageSpeed
      - name: Generate Right Side Visuals
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          
          # 3D Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Activity Graph Waves
          plugin_activitygraph: yes
          plugin_activitygraph_days: 14
          
          # Languages Progress Bars
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          
          # Gamified Arcade Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

          # Stargazers Growth Graph (Visualizes star acquisition trends over time)
          plugin_stargazers: yes
          plugin_stargazers_charts: yes

          # Google PageSpeed Insights (Displays standard score performance rings)
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/Talal-Ali
          plugin_pagespeed_detailed: no
