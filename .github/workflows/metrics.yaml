name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. FULL-WIDTH HEADER PANEL
      - name: Generate Top Header Card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-header.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header, metadata
          config_timezone: Asia/Karachi

      # 2. LEFT PANEL: Activity Streams, Coding Habits, Git Lines, Follow-up Stats
      - name: Generate Left Core Panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: activity, community, repositories
          config_timezone: Asia/Karachi
          
          # Coding Habits Charts
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Lines of Code Deltas
          plugin_lines: yes
          
          # Follow-up (Tracks discovery, open, and closed velocities of Issues/PRs)
          plugin_followup: yes
          plugin_followup_sections: repositories

      # 3. RIGHT PANEL: 3D Map, Dual Language Sections, Tech Grids, Reactions, Arcade Badges
      - name: Generate Right Graphical Panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          
          # 3D Isometric Matrix
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Deep Language breakdown (Displays both overall and recent activity profiles)
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Dev Skill Grid
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          
          # Emoji Reactions Tracker
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_days: 30
          
          # Gamified Badges
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
