name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: Generate Left Side Dash
      - name: Left Metrics Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # NOTE: Swap this with a Personal Access Token (PAT) if you want to scan your other private/public repos for language stats
          filename: "metrics-left.svg"
          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, repositories, metadata"
          config_timezone: "Asia/Karachi"
          
          plugin_languages: "yes"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used"
          plugin_languages_limit: 8
          
          plugin_habits: "yes"
          plugin_habits_days: 14
          plugin_habits_charts: "yes"
          plugin_lines: "yes"

      # Step 2: Generate Right Side Dash
      - name: Right Metrics Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-right.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"
          plugin_stargazers: "yes"
          
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"
          plugin_leetcode_sections: "status, ranking"

      # Step 3: Generate Bottom AniList Dash
      - name: AniList Custom Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: "NOT_NEEDED"
          filename: "metrics-anilist.svg"
          base: ""
          template: "classic"
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites"
          plugin_anilist_limit: 2
