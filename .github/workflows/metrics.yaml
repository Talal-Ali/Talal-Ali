name: GitHub Metrics
"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "github-metrics.svg"

          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, repositories, metadata"
          config_timezone: "Asia/Karachi"

          plugin_lines: "yes"
          plugin_lines_sections: "code"
          config_display: "large"
          config_animations: "yes"

          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "full-year"

          plugin_lighthouse: "yes"
          plugin_lighthouse_url: "https://your-portfolio-link"
          plugin_lighthouse_detailed: "yes"

          plugin_habits: "yes"
          plugin_habits_charts_type: "bar"
          plugin_habits_facts: "yes"
          plugin_habits_from: "200"

          plugin_languages: "yes"
          plugin_languages_analysis_timeout: "15"
          plugin_languages_skipped: "Talal-Ali"
          plugin_languages_details: "bytes-size, percentage"

          plugin_music: "no"

          plugin_projects: "yes"

          config_theme: "dark"
