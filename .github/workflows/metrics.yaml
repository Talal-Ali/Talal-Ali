name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Core Options
          user: YOUR_USERNAME
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi # Sets accurate commit activity times
          
          # Isometric calendar (The 3D contribution graph)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Coding habits and recent activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Most used languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_size: yes
          plugin_languages_threshold: 0%

          # Suggested tracks (Music plugin)
          plugin_music: yes
          plugin_music_provider: apple # Change to 'spotify' if preferred
          plugin_music_mode: recent
          plugin_music_limit: 2

          # PageSpeed Insights
          plugin_pagespeed: yes
          plugin_pagespeed_url: [https://your-portfolio-or-game-site.com](https://your-portfolio-or-game-site.com)

          # Mastered technologies (The icon grid)
          plugin_topics: yes
          plugin_topics_mode: icons
