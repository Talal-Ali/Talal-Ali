name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics-left:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-left.svg"
          user: "Talal-Ali"
          template: "classic"
          # Fixed plural "repositories" to enable language & habits scanning
          base: "header, activity, community, repositories, metadata"
          config_timezone: "Asia/Karachi"
          
          plugin_languages: "yes"
          plugin_languages_ignored: ""
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used"
          plugin_languages_limit: 8
          
          plugin_habits: "yes"
          plugin_habits_days: 14
          plugin_habits_charts: "yes"
          plugin_habits_facts: "no"
          plugin_lines: "yes"

  metrics-right:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-right.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"
          plugin_stargazers: "yes"
          
          # Simplified LeetCode to prevent API timeouts
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"

  metrics-anilist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: "metrics-anilist.svg"
          token: "NOT_NEEDED"
          base: ""
          template: "classic"
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites"
          plugin_anilist_limit: 2
