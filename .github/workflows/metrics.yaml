name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  # --- LEFT COLUMN PLUGINS ---
  left-column:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Core Profile & Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left-habits.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # Coding habits and activity charts
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: Mastered Technologies & Topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left-topics.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 20

  # --- RIGHT COLUMN PLUGINS ---
  right-column:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: PageSpeed & 3D Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right-geo.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          
          # PageSpeed Insights Performance
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/Talal-Ali
          
          # 3D Contribution Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Music & Languages & Projects
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right-details.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          
          # Suggested Tracks (Adjust provider to 'spotify' or 'apple')
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 2
          
          # Most Used Languages breakdown
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%
          
          # Project Roadmap & Todos
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
