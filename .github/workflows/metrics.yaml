name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # === LEFT PANEL: Profile Header, Coding Habits, Tech Grid ===
      - name: Left Column Components
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # Habits Charts
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Dev Icons Grid
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0

      # === RIGHT PANEL: PageSpeed, 3D Map, Music, Languages, Roadmap ===
      - name: Right Column Components
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          
          # PageSpeed Insights
          plugin_pagespeed: yes
          plugin_pagespeed_url: [https://github.com/Talal-Ali](https://github.com/Talal-Ali)
          
          # 3D Isometric Graph
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Music Stream Track
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 2
          
          # Language Breakdown Matrix
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%
          
          # Project Roadmap Tasks
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
