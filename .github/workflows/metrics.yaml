name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg

          # Base / user
          user: "Talal-Ali"
          template: "classic"
          base:
            - header
            - activity
            - community
            - repositories
            - metadata
          config_timezone: "Asia/Karachi"

          # Visual theme
          plugin_lines: true
          plugin_lines_sections:
            - code
          config_display: "large"
          config_animations: true

          # Isometric calendar
          plugin_isocalendar: true
          plugin_isocalendar_duration: "full-year"

          # Lighthouse (performance) plugin
          plugin_lighthouse: true
          plugin_lighthouse_url: "https://your-portfolio-link"
          plugin_lighthouse_detailed: true

          # Habits / activity
          plugin_habits: true
          plugin_habits_charts_type: "bar"
          plugin_habits_facts: true
          plugin_habits_from: 200

          # Languages
          plugin_languages: true
          plugin_languages_analysis_timeout: 15
          plugin_languages_skipped: "Talal-Ali"
          plugin_languages_details:
            - "bytes-size"
            - "percentage"

          # Optional features
          plugin_music: false
          plugin_projects: true

          # Theme
          config_theme: "dark"
