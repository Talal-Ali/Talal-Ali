name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Linked to your custom secret name
          token: ${{ secrets.readme }}

          # Core Options
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Most used languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%

          # Suggested tracks
          plugin_music: yes
          plugin_music_provider: apple
          plugin_music_mode: recent
          plugin_music_limit: 2

          # PageSpeed Insights (Tracks performance metrics of a target URL)
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/Talal-Ali

          # Mastered technologies
          plugin_topics: yes
          plugin_topics_mode: icons
