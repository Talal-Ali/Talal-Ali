name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Block 1: Top Left
      - name: Top Left - Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-top-left.svg"
          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, repositories, metadata"
          config_timezone: "Asia/Karachi"
          plugin_languages: "yes"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used"
          plugin_languages_limit: 8

      # Block 2: Top Right
      - name: Top Right - AniList
        uses: lowlighter/metrics@latest
        with:
          filename: "metrics-anilist.svg"
          token: "NOT_NEEDED"
          base: ""
          template: "classic"
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites"
          plugin_anilist_limit: 2

      # Block 3: Bottom Left
      - name: Bottom Left - LeetCode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-bottom-left.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"
          plugin_leetcode_sections: "status, ranking"

      # Block 4: Bottom Right
      - name: Bottom Right - Calendar & Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-bottom-right.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"
          plugin_habits: "yes"
          plugin_habits_days: 14
          plugin_habits_charts: "yes"
          plugin_habits_facts: "no"
          plugin_stargazers: "yes"
          plugin_lines: "yes"
