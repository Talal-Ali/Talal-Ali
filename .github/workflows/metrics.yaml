name: GitHub Metrics
"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics-left:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-left.svg"
          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, metadata"
          config_timezone: "Asia/Karachi"
          config_display: "large"
          config_theme: "dark"
          config_animations: "yes"

          # Coding Habits (Fixed history count to eliminate the red crash badge)
          plugin_habits: "yes"
          plugin_habits_days: 14
          plugin_habits_charts_type: "bar"
          plugin_habits_facts: "yes"

          # Language Activity Bars (FIXED: Removed skipped parameter so your code maps out)
          plugin_languages: "yes"
          plugin_languages_analysis_timeout: "15"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used"
          plugin_languages_limit: 8

          # Code line stats
          plugin_lines: "yes"
          plugin_lines_sections: "code"

  metrics-right:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-right.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: Asia/Karachi
          config_display: "large"
          config_theme: "dark"
          config_animations: "yes"

          # Isometric 3D contribution calendar
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"

          # Stargazers over time
          plugin_stargazers: "yes"
          plugin_stargazers_charts: "yes"

          # LeetCode statistics
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"
          plugin_leetcode_sections: "warnings, heatmap, ranking, problems"

  metrics-anilist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: "metrics.plugin.anilist.svg"
          token: "NOT_NEEDED"
          base: ""
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites, watching"
          plugin_anilist_limit: "2"
          plugin_anilist_limit_characters: "100"

  github-skyline-fixed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "github-skyline.svg"
          user: "Talal-Ali"
          base: ""
          template: "isometric"
          config_theme: "dark"
