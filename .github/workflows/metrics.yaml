name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This compiles everything into one large, high-density dashboard
          filename: "metrics-dashboard.svg"
          user: "Talal-Ali"
          
          # Using the template that supports the layout in image_878e84.jpg
          template: "classic"
          base: "header, activity, community, metadata"
          config_timezone: "Asia/Karachi"

          # Left side plugin configuration
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"
          
          plugin_languages: "yes"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used, recently-used"
          plugin_languages_limit: 8

          # Right side plugin configuration (Excluded characters as requested)
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites"
          plugin_anilist_limit: 2
