name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.readme }}

          # Core Profile Configurations
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # 3D Isometric Calendar Graph
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Coding Habits Panel (Center Left Charts)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Most Used Languages (Distribution Bar)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%

          # Project Roadmap & Tracking Items
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes

          # PageSpeed Insights Diagnostics
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/Talal-Ali

          # Mastered Technologies Grid Stack
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0

          # Suggested Audio Media Streams
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 2
