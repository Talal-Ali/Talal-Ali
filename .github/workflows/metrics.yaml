name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          
          # Core Sections (This activates your missing header block!)
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi

          # 1. 3D Isometric Calendar Graph
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 2. Coding Habits & Active Hours
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # 3. Code Volume (Vibrant Green/Red Line Deltas)
          plugin_lines: yes

          # 4. Multi-Language Polyglot Analysis
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # 5. Technical Skill Icon Grid
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15

          # 6. Community Reaction Emoji Counters
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_days: 30

          # 7. Gamified Arcade Badges (Space-saving compact strip)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
