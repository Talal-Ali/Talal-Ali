name: GitHub Metrics
"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics-left:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-left.svg"

          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, metadata"
          config_timezone: "Asia/Karachi"
          config_display: "large"
          config_theme: "dark"
          config_animations: "yes"

          # Commit habits / activity bars
          plugin_habits: "yes"
          plugin_habits_charts_type: "bar"
          plugin_habits_facts: "yes"
          plugin_habits_from: "200"

          # Language activity bars
          plugin_languages: "yes"
          plugin_languages_analysis_timeout: "15"
          plugin_languages_skipped: "Talal-Ali"
          plugin_languages_details: "bytes-size, percentage"

          # Code line stats
          plugin_lines: "yes"
          plugin_lines_sections: "code"

  metrics-right:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-right.svg"

          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          config_display: "large"
          config_theme: "dark"
          config_animations: "yes"

          # Isometric 3D contribution calendar (compact block, not full-year strip)
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"

          # Stargazers over time
          plugin_stargazers: "yes"
          plugin_stargazers_charts: "yes"

          # LeetCode statistics
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"
          plugin_leetcode_sections: "warnings, heatmap, ranking, problems"

          plugin_music: "no"

  metrics-anilist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: "metrics.plugin.anilist.svg"
          token: "NOT_NEEDED"
          base: ""
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites, watching"
          plugin_anilist_limit: "1"

  github-skyline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: "NOT_NEEDED"
          filename: "github-skyline.svg"
          user: "Talal-Ali"
          base: ""
          plugin_skyline: "yes"
          plugin_skyline_year: "2026"
          plugin_skyline_frames: "6"
          plugin_skyline_quality: "1"
