name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Unified Dashboard Generation
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Left Panel: Header, Habits, Language Activity, & Code Stats
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-left.svg"
          user: "Talal-Ali"
          template: "classic"
          base: "header, activity, community, metadata"
          config_timezone: "Asia/Karachi"
          
          # Habits
          plugin_habits: "yes"
          plugin_habits_days: 14
          plugin_habits_charts: "yes"
          
          # Language Activity (Removed ignored/skipped parameters to fix visibility)
          plugin_languages: "yes"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_sections: "most-used"
          plugin_languages_limit: 8
          
          # Code Stats
          plugin_lines: "yes"

      # Right Panel: Calendar, Stargazers, LeetCode
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-right.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          
          # Calendar
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "half-year"
          
          # Stargazers
          plugin_stargazers: "yes"
          plugin_stargazers_charts: "yes"
          
          # LeetCode
          plugin_leetcode: "yes"
          plugin_leetcode_user: "_talal_ali_"
          plugin_leetcode_sections: "heatmap, ranking, problems"

      # AniList Panel
      - uses: lowlighter/metrics@latest
        with:
          filename: "metrics-anilist.svg"
          token: "NOT_NEEDED"
          base: ""
          plugin_anilist: "yes"
          plugin_anilist_user: "TalalAl1"
          plugin_anilist_medias: "anime"
          plugin_anilist_sections: "favorites, watching"
          plugin_anilist_limit: 2
