name: GitHub Metrics
"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-calendar.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_timezone: "Asia/Karachi"
          config_display: "large"
          config_theme: "dark"
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "full-year"

  metrics-lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-lighthouse.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_display: "large"
          config_theme: "dark"
          plugin_lighthouse: "yes"
          plugin_lighthouse_url: "https://your-portfolio-link"
          plugin_lighthouse_detailed: "yes"

  metrics-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-languages.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_display: "large"
          config_theme: "dark"
          plugin_languages: "yes"
          plugin_languages_analysis_timeout: "15"
          plugin_languages_skipped: "Talal-Ali"
          plugin_languages_details: "bytes-size, percentage"

  metrics-lines:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: "metrics-lines.svg"
          user: "Talal-Ali"
          template: "classic"
          base: ""
          config_display: "large"
          config_theme: "dark"
          plugin_lines: "yes"
          plugin_lines_sections: "code"
