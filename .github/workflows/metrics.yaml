name: Metrics Dashboard
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # LEFT DASHBOARD FILE: Core stats, coding habits clock, lines of code changes
      - name: Generate Left Graphics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-left.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_lines: yes

      # RIGHT DASHBOARD FILE: 3D Calendar, language breakdown, tech grid, reactions, compact arcade badges
      - name: Generate Right Graphics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-right.svg
          token: ${{ secrets.readme }}
          user: Talal-Ali
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_days: 30
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
